<style>
    body{
        display: flex;
        height: 100vh;
        width: 100vw;
    }
    .profile-pic {
        display: flex;
        width: 148px;
        height: 148px;
        background-color: red;
        align-items: center;
        justify-content: center;
        position: relative;
    }

    .profile-img {
        height: 148px;
        width: 148px;
        position: relative;
    }

    .profile-img img {
        border-radius: 50%;
        width: 100%;
        height: 100%;
    }

    .profile-status {
        position: absolute;
        bottom: 0;
        left: 0;
        transform: translate(300%, 30%);
    }

    .profile-status img {
        position: absolute;
        border-radius: 50%;
        height: 50px;
        width: 50px;
        bottom: 0;
        left: 0;
        right: 0;
        transform: translate(200%, 20%);
    }

</style>
